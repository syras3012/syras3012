<svg width="1000" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4b5fd;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.5" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="200" rx="16" fill="url(#bgGrad)" />

  <!-- Wave shape bottom -->
  <path d="M0,140 C150,100 300,170 500,140 C700,110 850,160 1000,130 L1000,200 L0,200 Z"
        fill="url(#waveGrad)" opacity="0.6"/>
  <path d="M0,160 C200,130 400,180 600,155 C800,130 900,165 1000,150 L1000,200 L0,200 Z"
        fill="white" opacity="0.15"/>

  <!-- Welcome Text -->
  <text x="500" y="95"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="52"
        font-weight="bold"
        fill="white"
        text-anchor="middle"
        dominant-baseline="middle"
        filter="drop-shadow(2px 2px 4px rgba(0,0,0,0.2))">
    Welcome to my profile!
  </text>
</svg>
