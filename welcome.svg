<svg width="1000" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b39ddb;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9fa8da;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7986cb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b39ddb;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#7986cb;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9575cd;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#5c6bc0;stop-opacity:0.5" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="200" fill="url(#bgGrad)" />

  <!-- Wave 1 -->
  <path d="M0,130 C100,110 200,155 350,135 C500,115 600,150 750,130 C850,115 930,140 1000,125 L1000,200 L0,200 Z"
        fill="url(#wave1)"/>

  <!-- Wave 2 -->
  <path d="M0,155 C120,140 250,170 400,155 C550,140 700,165 850,150 C920,143 970,158 1000,152 L1000,200 L0,200 Z"
        fill="url(#wave2)"/>

  <!-- Welcome Text -->
  <text x="500" y="90"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="56"
        font-weight="bold"
        fill="white"
        text-anchor="middle"
        opacity="0.95">
    Welcome to my profile!
  </text>
</svg>
