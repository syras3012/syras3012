<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none" width="1000" height="120">
  <defs>
    <linearGradient id="teal1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#45b7aa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="teal2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7eddd7;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#5ecec8;stop-opacity:0.7" />
    </linearGradient>
  </defs>

  <!-- Back wave -->
  <path d="M0,40 C200,10 400,70 600,40 C800,10 1000,60 1200,35 L1200,120 L0,120 Z"
        fill="url(#teal1)"/>

  <!-- Front wave -->
  <path d="M0,65 C150,45 350,85 550,60 C750,35 950,75 1200,55 L1200,120 L0,120 Z"
        fill="url(#teal2)"/>
</svg>
