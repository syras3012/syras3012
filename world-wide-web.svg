<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="globeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#60d0f0;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0077cc;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <!-- Globe circle -->
  <circle cx="32" cy="32" r="30" fill="url(#globeGrad)" stroke="#005fa3" stroke-width="1.5"/>

  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="30" ry="12" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="2" y1="32" x2="62" y2="32" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="8" y1="16" x2="56" y2="16" stroke="white" stroke-width="0.8" opacity="0.4"/>
  <line x1="8" y1="48" x2="56" y2="48" stroke="white" stroke-width="0.8" opacity="0.4"/>

  <!-- Longitude lines -->
  <ellipse cx="32" cy="32" rx="14" ry="30" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="2" x2="32" y2="62" stroke="white" stroke-width="1" opacity="0.5"/>

  <!-- Globe outline -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="white" stroke-width="1.5"/>

  <!-- WWW text -->
  <text x="32" y="36" font-family="Arial" font-size="10" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle"
        filter="drop-shadow(1px 1px 2px rgba(0,0,0,0.4))">www</text>
</svg>
